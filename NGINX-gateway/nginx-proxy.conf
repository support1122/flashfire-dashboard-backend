# nginx-proxy.conf  (template used by envsubst on Render)
worker_processes auto;
events { worker_connections 4096; }

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      keep-alive;
  }

  sendfile on;
  client_max_body_size 50m;

  # ---- 24h client <-> nginx timeouts ----
  keepalive_timeout       86400s;
  keepalive_requests      10000;
  client_header_timeout   86400s;
  client_body_timeout     86400s;
  send_timeout            86400s;

  # ---- proxy defaults (24h) ----
  proxy_http_version      1.1;
  proxy_connect_timeout   60s;
  proxy_read_timeout      86400s;
  proxy_send_timeout      86400s;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade           $http_upgrade;
  proxy_set_header Connection        $connection_upgrade;

  server {
    # Render injects $PORT; we render it in at startup
    listen ${PORT};

    # ---- Backend prefixes (your Express routes) ----
    # /auth/*, /setprofile, /upload-profile-file, /addjob, /getalljobs,
    # /storejobanduserdetails, /updatechanges, plus any /api/* (e.g. /api/plans/select)
    location ~ ^/(auth|setprofile|upload-profile-file|addjob|getalljobs|storejobanduserdetails|updatechanges|api)(/|$) {
      proxy_pass https://${BACKEND_HOST};
    }

    # (optional) SSE stream if you use it at /events
    location /events {
      proxy_pass https://${BACKEND_HOST};
      proxy_buffering off;
    }

    # (optional) WebSockets (socket.io or custom at /ws)
    location ~ ^/(socket\.io|ws) {
      proxy_pass https://${BACKEND_HOST};
    }

    # ---- Frontend ----
    # If you also want the gateway to forward all other paths to your Static Site on Render,
    # set FRONTEND_HOST and uncomment this:
    location / {
      proxy_pass https://${FRONTEND_HOST};
    }

    # If you *don’t* want to proxy the frontend here, you can replace the above
    # with a simple 200 message, and point your domain to the Static Site directly.
  }
}
