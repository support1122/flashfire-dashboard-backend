# ./nginx-proxy.conf
worker_processes auto;
events { worker_connections 4096; }

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      keep-alive;
  }

  # --- 24h client <-> nginx timeouts ---
  keepalive_timeout       86400s;
  keepalive_requests      10000;
  client_header_timeout   86400s;
  client_body_timeout     86400s;
  send_timeout            86400s;
  sendfile on;

  # --- proxy defaults (can override per location) ---
  proxy_http_version      1.1;
  proxy_connect_timeout   60s;        # TCP connect to upstream (short is fine)
  proxy_read_timeout      86400s;     # wait for upstream data up to 24h
  proxy_send_timeout      86400s;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade           $http_upgrade;
  proxy_set_header Connection        $connection_upgrade;

  # Upstreams match your compose service names/ports
  upstream backend_upstream { server backend:8001; keepalive 64; }
  upstream frontend_upstream { server frontend:80; keepalive 64; }

  server {
    listen 80;

    # REST API (adjust prefix if your backend isn’t under /api)
    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # Server-Sent Events (if you use it)
    location /events {
      proxy_pass http://backend_upstream;
      proxy_buffering off;            # critical for SSE
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # WebSockets (socket.io or custom) — adjust path if needed
    location ~ ^/(socket\.io|ws) {
      proxy_pass http://backend_upstream;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # Frontend
    location / {
      proxy_pass http://frontend_upstream;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }
  }

  # OPTIONAL: add a 443 server with ssl_certificate if you terminate TLS here
}
